<script>
const cards = {
  theorie: [
    {
      q: "Pourquoi Z_S = Z_L = 50 Ω pour mesurer les paramètres S ?",
      a: "<p>Les paramètres S sont normalisés sur une impédance de référence Z₀ = 50 Ω.</p><p>Pour extraire un paramètre <code>S_ij</code> isolément, il faut annuler l'onde incidente du port j (<code>a_j = 0</code>). Cette condition n'est obtenue que si la charge sur ce port est parfaitement adaptée à 50 Ω.</p><p>Sinon, une partie de l'onde sortante <code>b_j</code> est réfléchie et revient sous forme d'onde incidente non nulle, ce qui fausse la mesure.</p>"
    },
    {
      q: "Que signifie S₂₁ ?",
      a: "<p><strong>S₂₁ = b₂/a₁ quand a₂ = 0</strong></p><p>C'est la transmission directe : onde envoyée sur le port 1 → mesurée à la sortie du port 2. C'est le <strong>gain</strong> de l'amplificateur.</p><span class='formula'>|S₂₁|² = G₀ (gain en puissance)</span><p>En dB : G(dB) = 20·log|S₂₁| = 10·log|S₂₁|²</p>"
    },
    {
      q: "Que signifie S₁₁ ?",
      a: "<p><strong>S₁₁ = b₁/a₁ quand a₂ = 0</strong></p><p>Réflexion à l'entrée. Sur l'abaque de Smith, S₁₁ donne directement l'impédance d'entrée du transistor.</p><p>• |S₁₁| = 0 → adaptation parfaite<br>• |S₁₁| = 1 → réflexion totale<br>• En pratique on veut |S₁₁| &lt; −10 dB</p>"
    },
    {
      q: "Que signifie S₁₂ ?",
      a: "<p><strong>S₁₂ = b₁/a₂ quand a₁ = 0</strong></p><p>Transmission inverse (sortie → entrée) = <strong>isolation</strong>. On veut |S₁₂| <em>le plus petit possible</em>.</p><p>• À BF : excellente isolation (~−60 dB)<br>• À HF : se dégrade à cause du couplage capacitif interne base-collecteur.</p><p>Une mauvaise isolation favorise l'instabilité.</p>"
    },
    {
      q: "Que signifie S₂₂ ?",
      a: "<p><strong>S₂₂ = b₂/a₂ quand a₁ = 0</strong></p><p>Réflexion à la sortie, symétrique de S₁₁ mais côté sortie. Sa position sur l'abaque de Smith donne l'impédance de sortie du transistor.</p><p>On veut |S₂₂| faible (typiquement &lt; −10 dB) pour une bonne adaptation.</p>"
    },
    {
      q: "Mnémonique pour les indices S_(destination)(source)",
      a: "<p>Le <strong>premier indice</strong> = où l'onde arrive (destination, ligne de la matrice).</p><p>Le <strong>deuxième indice</strong> = d'où l'onde vient (source, colonne).</p><p>Exemples :<br>• <strong>S₂₁</strong> : venue du 1, arrivée au 2 = gain (1→2)<br>• <strong>S₁₂</strong> : venue du 2, arrivée au 1 = isolation (2→1)</p><p>Comme une matrice : ligne, colonne.</p>"
    },
    {
      q: "Rôle de l'inductance (RFC) dans un té de polarisation",
      a: "<p><span class='formula'>Z_L = jLω</span><p>• En DC (ω = 0) : Z_L = 0 → laisse passer le courant de polarisation<br>• En HF (1 GHz, L=47nH) : Z_L ≈ 295 Ω → bloque le signal RF qui ne peut pas s'échapper vers l'alimentation</p><p><strong>Sans elle</strong> : l'alim DC court-circuiterait la RF à la masse → gain effondré.</p>"
    },
    {
      q: "Rôle du condensateur (DC-block) dans un té de polarisation",
      a: "<p><span class='formula'>Z_C = 1 / jCω</span><p>• En DC : Z_C = ∞ → bloque la composante continue → polarisation conservée sur le transistor<br>• En HF (1 GHz, C=100pF) : Z_C ≈ 1,6 Ω → laisse passer le signal RF</p><p><strong>Sans lui</strong> : le port 50 Ω court-circuiterait la tension de polarisation → V_BE = 0, transistor bloqué.</p>"
    },
    {
      q: "Règle de dimensionnement d'un té de polarisation",
      a: "<p>À la fréquence de travail, vérifier <strong>simultanément</strong> :</p><span class='formula'>|Z_L| ≫ 50 Ω  ET  |Z_C| ≪ 50 Ω</span><p>Un facteur 5 à 10 de chaque côté est largement suffisant.</p><p><strong>Exemple à 1 GHz</strong> : L = 47 nH (Z_L = 295 Ω, facteur 6) et C = 100 pF (Z_C = 1,6 Ω, facteur 30).</p>"
    },
    {
      q: "Formule du gain transducique G_T",
      a: "<span class='formula'>G_T = |S₂₁|² · (1−|Γ_S|²)(1−|Γ_L|²) / |1−S₁₁·Γ_S|² · |1−S₂₂·Γ_L|²</span><p>Se décompose en trois termes :</p><span class='formula'>G_T = G_S × G₀ × G_L</span><p>où G_S et G_L sont les gains apportés par les cellules d'adaptation d'entrée et de sortie, et G₀ = |S₂₁|² est le gain brut du transistor.</p>"
    },
    {
      q: "Cas particulier G₀ quand Γ_S = Γ_L = 0",
      a: "<p>Si source et charge sont à 50 Ω (Γ_S = Γ_L = 0), tous les termes correctifs valent 1, et G_T se simplifie :</p><span class='formula'>G₀ = |S₂₁|²</span><p>C'est le gain « brut » du transistor, sans aucune adaptation. Sert de référence pour évaluer l'apport des circuits d'adaptation.</p>"
    },
    {
      q: "Conditions d'adaptation conjuguée (gain max)",
      a: "<p>Pour obtenir le gain maximal du transistor :</p><span class='formula'>Γ_in = Γ_S*   ET   Γ_out = Γ_L*</span><p>(adaptation conjuguée aux deux ports)</p><p>Quand ces deux conditions sont vérifiées simultanément, G_T atteint sa valeur maximale G_T,max. C'est ce que QUCS calcule via « Calculate two-port matching ».</p>"
    },
    {
      q: "Définition de Δ (déterminant de la matrice S)",
      a: "<span class='formula'>Δ = S₁₁·S₂₂ − S₁₂·S₂₁</span><p>C'est le déterminant de la matrice S 2×2.</p><p>Utilisé dans le critère de stabilité de Rollet. Doit vérifier |Δ| &lt; 1 pour une stabilité inconditionnelle.</p>"
    },
    {
      q: "Définition du facteur de Rollet K",
      a: "<span class='formula'>K = (1 − |S₁₁|² − |S₂₂|² + |Δ|²) / (2·|S₁₂|·|S₂₁|)</span><p>Permet de tester la stabilité d'un amplificateur.</p><p>Sous QUCS : fonction <code>rollet()</code>, automatiquement disponible après une simulation S-parameter.</p>"
    },
    {
      q: "Critère de stabilité inconditionnelle",
      a: "<p><strong>Les DEUX conditions simultanément :</strong></p><span class='formula'>K &gt; 1   ET   |Δ| &lt; 1</span><p>Dans cette plage de fréquences, l'amplificateur ne peut <strong>jamais</strong> osciller, quel que soit le choix de Z_S et Z_L (à l'intérieur de l'abaque de Smith).</p><p>Piège : K &gt; 1 seul ne suffit pas !</p>"
    },
    {
      q: "Stabilité conditionnelle : que faire ?",
      a: "<p>Quand K &lt; 1 ou |Δ| &gt; 1, certaines valeurs de Z_S ou Z_L peuvent rendre le circuit instable (oscillation).</p><p><strong>Méthode</strong> : tracer les cercles de stabilité sur l'abaque de Smith :<br>• <code>stabS()</code> côté source<br>• <code>stabL()</code> côté charge</p><p>Choisir Z_S et Z_L <strong>en dehors</strong> des zones interdites (à l'intérieur des cercles).</p>"
    },
    {
      q: "Conversion Γ ↔ Z",
      a: "<span class='formula'>Γ = (Z − Z₀) / (Z + Z₀)</span><span class='formula'>Z = Z₀ · (1 + Γ) / (1 − Γ)</span><p>avec Z₀ = 50 Ω.</p><p><strong>Centre de l'abaque de Smith</strong> : Γ = 0 ↔ Z = 50 Ω (adaptation parfaite).</p>"
    },
    {
      q: "Conversion dB ↔ linéaire (puissance)",
      a: "<span class='formula'>G(dB) = 10·log(G_lin)</span><span class='formula'>G_lin = 10^(G(dB)/10)</span><p><strong>Repères à connaître :</strong><br>• 3 dB ↔ ×2<br>• 6 dB ↔ ×4<br>• 10 dB ↔ ×10<br>• 20 dB ↔ ×100<br>• −3 dB ↔ ÷2</p>"
    },
    {
      q: "Que mesure le facteur de bruit NF ?",
      a: "<p>NF mesure la dégradation du rapport signal/bruit entre l'entrée et la sortie d'un amplificateur.</p><span class='formula'>NF = (S_E/N_E) / (S_S/N_S)</span><p>• Idéalement NF = 0 dB (aucun bruit ajouté) → irréalisable<br>• En pratique : NF_min entre 1 et 5 dB selon le transistor et le point de polarisation</p>"
    },
    {
      q: "Différence entre NF, NF_min et S_opt",
      a: "<p><strong>NF</strong> : facteur de bruit obtenu avec les impédances actuelles présentées au transistor.</p><p><strong>NF_min</strong> : valeur <em>minimale</em> physiquement atteignable pour ce transistor à ce point de polarisation.</p><p><strong>S_opt (= Γ_opt)</strong> : coefficient de réflexion à présenter en entrée pour atteindre NF_min.</p><p>Si Γ_S = 0 (port 50 Ω), alors NF &gt; NF_min.</p>"
    },
    {
      q: "Pourquoi un LNA et un PA ont des compromis opposés",
      a: "<p><strong>LNA</strong> (Low Noise Amplifier) : faible I_C → faible bruit ET gain max, mais puissance de sortie limitée.</p><p><strong>PA</strong> (Power Amplifier) : fort I_C → forte puissance, mais gain plus modeste ET bruit dégradé.</p><p>Exemples :<br>• BFR92A (I_C = 18 mA) → plutôt LNA<br>• BFG135 (I_C = 100 mA) → plutôt PA</p>"
    },
    {
      q: "Comportement de S₂₁ avec la fréquence",
      a: "<p>|S₂₁| <strong>décroît</strong> avec la fréquence — comportement universel d'un transistor.</p><p><strong>Cause physique</strong> : les capacités parasites internes filtrent les hautes fréquences.</p><p>À l'approche de f_T (fréquence de transition), le gain s'effondre à 1 (= 0 dB). Au-delà, le transistor n'amplifie plus.</p>"
    },
    {
      q: "Comportement de S₁₂ avec la fréquence",
      a: "<p>|S₁₂| <strong>croît</strong> avec la fréquence (à l'inverse de S₂₁).</p><p>• À BF : excellente isolation (~−60 dB)<br>• À HF : le couplage capacitif interne base-collecteur (capacité C_re) dégrade l'isolation</p><p>Conséquence : une mauvaise isolation favorise les boucles de retour → instabilité.</p>"
    },
    {
      q: "Point de compression −1 dB",
      a: "<p>Niveau de puissance d'entrée à partir duquel le gain réel devient inférieur de 1 dB à sa valeur asymptotique linéaire.</p><p><strong>Au-delà</strong> : saturation, distorsion, apparition d'harmoniques (2, 3, …).</p><p>C'est la <strong>limite supérieure de la zone linéaire</strong> de l'amplificateur. Toute application linéaire (LNA) doit fonctionner en dessous de ce point.</p>"
    },
    {
      q: "Cercle à gain constant : à quoi ça sert ?",
      a: "<p>Sur l'abaque de Smith, un cercle <code>GaCircle(G)</code> regroupe <strong>tous les Γ_S qui donnent un gain G</strong>.</p><p><strong>Utilité</strong> : choisir un Γ_S parmi plusieurs candidats, par exemple pour :<br>• élargir la bande passante au prix d'un gain plus faible<br>• faire un compromis gain / bruit (intersection avec un cercle de bruit)</p>"
    },
    {
      q: "Cercle à bruit constant : à quoi ça sert ?",
      a: "<p>Un cercle <code>noiseCircle(NF)</code> regroupe <strong>tous les Γ_S qui donnent un facteur de bruit NF</strong>.</p><p>En traçant <strong>ensemble</strong> un cercle de gain et un cercle de bruit, on trouve à leur intersection le ou les Γ_S qui satisfont <em>simultanément</em> les deux contraintes : c'est la méthode du compromis gain–bruit.</p>"
    },
    {
      q: "PIÈGE : unités GaCircle vs noiseCircle",
      a: "<p><strong>Source d'erreur n°1 sur la copie !</strong></p><p>• <code>GaCircle(valeur)</code> attend la valeur <strong>en linéaire</strong><br>Ex : G = 10 dB → <code>GaCircle(10)</code></p><p>• <code>noiseCircle(valeur)</code> attend la valeur <strong>en dB</strong><br>Ex : NF = 5 dB → <code>noiseCircle(5)</code></p><p>Mélanger les unités fait planter complètement la question.</p>"
    },
    {
      q: "Pourquoi le gain max n'est pas toujours souhaitable",
      a: "<p>L'adaptation conjuguée donne le gain MAX, mais :</p><p>• Bande passante étroite<br>• Sensible aux variations des composants<br>• Peut être loin du point de bruit minimal (S_opt)<br>• Risque d'instabilité accru</p><p>Avec les cercles à gain constant, on peut choisir un gain légèrement inférieur pour <strong>gagner en bande passante, en bruit, ou en stabilité</strong>.</p>"
    }
  ],
  manips: [
    {
      q: "Vérifier le point de polarisation DC",
      a: "<p>1. Ajouter un bloc <code>DC simulation</code> (DC1)<br>2. Régler V1 (V_BE) et V2 (V_CE) aux valeurs cibles<br>3. Insérer un probe de courant sur le collecteur<br>4. Lancer la simulation<br>5. Lire <code>Pr1.I</code> dans les résultats → doit correspondre à I_C visé</p><p>Pour tracer I_C = f(V_BE) : ajouter un bloc <code>sweep</code> paramétrique sur V_BE.</p>"
    },
    {
      q: "Ajouter un té de polarisation côté base",

const state = {
  category: 'theorie',
  index: 0,
  order: []
};

const elCard = document.getElementById('card');
const elQuestion = document.getElementById('question');
const elAnswer = document.getElementById('answer');
const elCurrent = document.getElementById('current');
const elTotal = document.getElementById('total');
const elCatLabel = document.getElementById('catLabel');
const elCatLabel2 = document.getElementById('catLabel2');
const elProgress = document.getElementById('progressBar');

function initOrder() {
  state.order = cards[state.category].map((_, i) => i);
}

function shuffle() {
  for (let i = state.order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [state.order[i], state.order[j]] = [state.order[j], state.order[i]];
  }
  state.index = 0;
  render();
}

function render() {
  const card = cards[state.category][state.order[state.index]];
  elQuestion.innerHTML = card.q;
  elAnswer.innerHTML = card.a;
  elCurrent.textContent = state.index + 1;
  elTotal.textContent = cards[state.category].length;
  elCard.classList.remove('flipped');
  const label = state.category === 'theorie' ? 'Théorie' : 'Manips QUCS';
  elCatLabel.textContent = label;
  elCatLabel2.textContent = label;
  const pct = ((state.index + 1) / cards[state.category].length) * 100;
  elProgress.style.width = pct + '%';
}

function next() {
  state.index = (state.index + 1) % cards[state.category].length;
  render();
}

function prev() {
  state.index = (state.index - 1 + cards[state.category].length) % cards[state.category].length;
  render();
}

function flip() {
  elCard.classList.toggle('flipped');
}

function switchCategory(cat) {
  if (cat === state.category) return;
  state.category = cat;
  state.index = 0;
  initOrder();
  document.body.setAttribute('data-cat', cat);
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.cat === cat);
  });
  render();
}

document.getElementById('prev').addEventListener('click', (e) => { e.stopPropagation(); prev(); });
document.getElementById('next').addEventListener('click', (e) => { e.stopPropagation(); next(); });
document.getElementById('flip').addEventListener('click', (e) => { e.stopPropagation(); flip(); });
document.getElementById('shuffle').addEventListener('click', (e) => { e.stopPropagation(); shuffle(); });
elCard.addEventListener('click', flip);

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => switchCategory(tab.dataset.cat));
});

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
  else if (e.key === 'ArrowRight') { e.preventDefault(); next(); }
  else if (e.key === ' ') { e.preventDefault(); flip(); }
  else if (e.key === 's' || e.key === 'S') { shuffle(); }
  else if (e.key === '1') { switchCategory('theorie'); }
  else if (e.key === '2') { switchCategory('manips'); }
});

initOrder();
render();
</script>
